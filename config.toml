# Conn user config. Secrets never live here; OPENAI_API_KEY comes from the environment.

[hotkey]
ptt = "alt_r"            # daemon-only fallback; installed Conn.app uses its persisted Push-to-Talk Key menu setting
confirm = ["cmd+t", "cmd+w", "cmd+n"]   # tab/window verbs run behind the approval chip; everything else refuses toward app_menu

[realtime]
model = "gpt-realtime-2"
voice = "marin"
reasoning_effort = "low"
transcription_language = "en"   # pins input transcription; short clips stop decoding as random languages

[audio]
preroll_ms = 400          # capture ring flushed ahead of live frames at PTT keydown, so the first syllable survives
input_device = ""         # substring match against input device names; empty means system default
low_signal_rms = 150.0    # listening windows peaking below this show a "barely heard you" hint

[budget]
session_cap_usd = 5.00
warn_at_usd = 2.50
hard_stop = true          # false downgrades the cap to warn-only

[session]
idle_timeout_s = 300      # close the upstream session after this long in IDLE
done_flash_ms = 1500      # how long the "done" state lingers before returning to idle
tap_threshold_ms = 300    # a press shorter than this is an accidental tap: discarded, zero spend
reconnect_window_s = 300  # keep a dropped upstream session visibly reconnecting for five minutes
reconnect_max_delay_s = 30 # cap exponential retry spacing so recovery stays responsive

[actions]
visual_enabled = true
visual_verify_ms = 2500
create_verify_ms = 2500

[apps]
allowlist = ["Obsidian", "Google Chrome", "Safari", "Finder", "Notes", "Terminal"]

[apps.bundle_ids]
Obsidian = "md.obsidian"
"Google Chrome" = "com.google.Chrome"
Safari = "com.apple.Safari"
Finder = "com.apple.finder"
Notes = "com.apple.Notes"
Terminal = "com.apple.Terminal"

[apps.team_ids]
Obsidian = "6JSW4SJWN9"

[browser]
search_url = "https://www.google.com/search?q={q}"

[phoenix]
vault_root = "/Users/samaydhawan/phoenix"
qmd_bin = "/Users/samaydhawan/.nvm/versions/node/v22.15.0/bin/qmd"
obsidian_vault = "phoenix"

[screenshots]
keep = false              # raw screenshots are deleted at session end unless true

[server]
host = "127.0.0.1"
port = 8787

# Per-tool risk escalation. Example: make clipboard writes require approval.
[risk_overrides]
# "clipboard_set" = "confirm"

# Prices per 1M tokens, kept in config so a price change never needs a code edit.
[pricing]
text_in = 4.00
text_out = 24.00
audio_in = 32.00
audio_out = 64.00
cached_in = 0.40
image_in = 5.00
