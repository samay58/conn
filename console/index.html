<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conn</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="surface">
  <header class="bar">
    <div class="ident">
      <span class="dot" id="conn-dot"></span>
      <h1>Conn</h1>
      <span class="mode" id="mode-label">demo</span>
    </div>
    <div class="bar-actions"><span class="mode">approvals only</span></div>
  </header>

  <div class="grant-banner" id="grant-banner" hidden></div>

  <section class="transcript" id="transcript" aria-live="polite">
    <p class="hint" id="hint">Diagnostic view. Use Conn.app for input, Stop, and session controls.</p>
  </section>

  <section class="chips" id="chips"></section>

  <section class="command" aria-label="Current Conn state">
    <div id="ptt" class="ptt" data-phase="idle">
      <span class="ptt-state" id="ptt-state">Idle</span>
      <span class="ptt-sub" id="ptt-sub">observe in Conn.app</span>
    </div>
  </section>

  <footer class="meter">
    <details id="trace-panel">
      <summary>
        <span id="trace-count">0 events</span>
        <span class="meter-cost" id="cost-line">$0.0000</span>
      </summary>
      <ol id="trace-list"></ol>
      <div class="receipt" id="receipt"></div>
    </details>
  </footer>
</main>

<div class="toasts" id="toasts"></div>
<script src="app.js"></script>
</body>
</html>
